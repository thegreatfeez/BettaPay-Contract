name: Feature Request
description: Suggest a new feature or enhancement for BettaPay.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. Please describe the feature and the problem it solves.
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem are you trying to solve? Why is it needed?
      placeholder: It is currently difficult to ...
    validations:
      required: true
  - type: dropdown
    id: subsystem
    attributes:
      label: Target Sub-System
      description: Which part of the system would this feature affect?
      options:
        - Smart Contracts (BettaPay-Contract)
        - Backend Services (BettaPay-Backend)
        - Frontend Dashboard (BettaPay-Frontend)
        - Other / Cross-cutting
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like and how it should behave.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Describe any alternative solutions or features you've considered.
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any other context, references, or screenshots about the feature request here.
    validations:
      required: false
