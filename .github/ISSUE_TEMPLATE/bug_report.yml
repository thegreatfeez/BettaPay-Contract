name: Bug Report
description: Report a defect or unexpected behavior in BettaPay.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill out the sections below so we can reproduce and fix the issue quickly.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
      placeholder: When I call transfer_admin with ..., the contract ...
    validations:
      required: true
  - type: dropdown
    id: subsystem
    attributes:
      label: Affected Sub-System
      description: Which part of the system does this affect?
      options:
        - Smart Contracts (BettaPay-Contract)
        - Backend Services (BettaPay-Backend)
        - Frontend Dashboard (BettaPay-Frontend)
        - Other / Not sure
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: List the exact steps required to reproduce the behavior.
      placeholder: |
        1. Deploy the settlement contract
        2. Call '...' with arguments '...'
        3. Observe '...'
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include error messages, panics, or transaction hashes where applicable.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Versions and context relevant to the bug.
      placeholder: |
        - Network: testnet / futurenet / local
        - soroban-cli / Rust toolchain version:
        - Commit / branch:
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Logs, screenshots, or any other information that might help.
    validations:
      required: false
